<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Очередь обработки - PaddleOCR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">
    <div class="min-h-screen py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden">
                <div class="p-6 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Очередь обработки</h2>
                    <a href="/" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">
                        + Добавить файлы
                    </a>
                </div>
                
                <div class="divide-y divide-gray-200 dark:divide-gray-700" id="tasks-container">
                    {% for task in tasks %}
                    <div class="p-6 transition-colors hover:bg-gray-50 dark:hover:bg-gray-750 task-row" id="task-{{ task.task_id }}" data-task-id="{{ task.task_id }}">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium text-indigo-600 truncate">{{ task.filename }}</p>
                                <div class="mt-2 flex items-center">
                                    <div class="flex-1 bg-gray-200 dark:bg-gray-700 rounded-full h-2 max-w-xs overflow-hidden">
                                        <div id="progress-bar-{{ task.task_id }}" class="bg-indigo-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                                    </div>
                                    <span class="ml-3 text-xs text-gray-500 dark:text-gray-400" id="progress-text-{{ task.task_id }}">0%</span>
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-4">
                                <span id="status-badge-{{ task.task_id }}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300">
                                    <svg class="animate-spin -ml-1 mr-2 h-3 w-3 text-blue-600 dark:text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                    Обработка
                                </span>
                                
                                <div id="actions-{{ task.task_id }}" class="hidden">
                                    <a href="/success/{{ task.task_id }}" class="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                                        Просмотреть
                                    </a>
                                </div>
                                
                                <button onclick="toggleDetails('{{ task.task_id }}')" class="text-gray-400 hover:text-gray-500">
                                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <div id="details-{{ task.task_id }}" class="mt-4 hidden border-t border-gray-100 dark:border-gray-700 pt-4">
                            <div class="grid grid-cols-2 gap-4 text-xs">
                                <div>
                                    <p class="text-gray-500 dark:text-gray-400">ID Задачи:</p>
                                    <p class="font-mono text-gray-900 dark:text-white">{{ task.task_id }}</p>
                                </div>
                                <div>
                                    <p class="text-gray-500 dark:text-gray-400">Страниц:</p>
                                    <p class="text-gray-900 dark:text-white" id="pages-{{ task.task_id }}">--</p>
                                </div>
                                <div class="col-span-2" id="error-container-{{ task.task_id }}" class="hidden">
                                    <p class="text-red-500 font-medium">Ошибка:</p>
                                    <p class="text-red-400" id="error-text-{{ task.task_id }}"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script>
        const tasks = [
            {% for task in tasks %}
            { id: "{{ task.task_id }}", filename: "{{ task.filename }}", status: 'processing' },
            {% endfor %}
        ];

        function toggleDetails(taskId) {
            const details = document.getElementById(`details-${taskId}`);
            details.classList.toggle('hidden');
        }

        function updateTaskStatus(task) {
            if (task.status === 'completed' || task.status === 'failed') return;

            fetch(`/api/task_status/${task.id}`)
                .then(response => response.json())
                .then(data => {
                    const progressBar = document.getElementById(`progress-bar-${task.id}`);
                    const progressText = document.getElementById(`progress-text-${task.id}`);
                    const statusBadge = document.getElementById(`status-badge-${task.id}`);
                    const actions = document.getElementById(`actions-${task.id}`);
                    const pagesText = document.getElementById(`pages-${task.id}`);

                    if (data.progress !== undefined) {
                        progressBar.style.width = data.progress + '%';
                        progressText.textContent = data.progress + '%';
                    }

                    if (data.total_pages) {
                        pagesText.textContent = `${data.processed_pages} / ${data.total_pages}`;
                    }

                    if (data.status === 'completed') {
                        task.status = 'completed';
                        statusBadge.className = "inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300";
                        statusBadge.innerHTML = `
                            <svg class="-ml-1 mr-2 h-3 w-3 text-green-600 dark:text-green-400" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                            </svg>
                            Готово
                        `;
                        actions.classList.remove('hidden');
                        progressBar.classList.remove('bg-indigo-600');
                        progressBar.classList.add('bg-green-500');
                    } else if (data.status === 'failed') {
                        task.status = 'failed';
                        statusBadge.className = "inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300";
                        statusBadge.innerHTML = `
                            <svg class="-ml-1 mr-2 h-3 w-3 text-red-600 dark:text-red-400" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                            </svg>
                            Ошибка
                        `;
                        const errorContainer = document.getElementById(`error-container-${task.id}`);
                        const errorText = document.getElementById(`error-text-${task.id}`);
                        errorContainer.classList.remove('hidden');
                        errorText.textContent = data.error || 'Неизвестная ошибка';
                        progressBar.classList.remove('bg-indigo-600');
                        progressBar.classList.add('bg-red-500');
                    } else {
                        // Still processing, schedule next check
                        setTimeout(() => updateTaskStatus(task), 2000);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    setTimeout(() => updateTaskStatus(task), 5000);
                });
        }

        // Start polling for each task
        tasks.forEach(updateTaskStatus);
    </script>
</body>
</html>
