version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-frontend
    ports:
      - "8011:8011"
    volumes:
      - ./uploads:/app/uploads
      - ./debug_images:/app/debug_images
    environment:
      - DOCKER_ENV=true
      - PORT=8011
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped