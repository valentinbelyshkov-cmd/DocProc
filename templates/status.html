<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing - PaddleOCR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8">
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-100 dark:bg-indigo-900/30 mb-4">
                <svg class="animate-spin h-8 w-8 text-indigo-600 dark:text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2" id="status-text">Processing...</h2>
            <p class="text-gray-600 dark:text-gray-400 mb-6" id="status-detail">Sending document to PaddleOCR backend</p>
            
            <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2.5 overflow-hidden">
                <div id="progress-bar" class="bg-indigo-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p class="mt-2 text-sm text-gray-500 dark:text-gray-400" id="progress-text">0%</p>
        </div>
    </div>

    <script>
        const taskId = "{{ task_id }}";
        const statusText = document.getElementById('status-text');
        const statusDetail = document.getElementById('status-detail');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');

        function checkStatus() {
            fetch(`/api/task_status/${taskId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'completed') {
                        window.location.href = data.redirect;
                    } else if (data.status === 'failed') {
                        alert('Processing failed: ' + data.error);
                        window.location.href = '/';
                    } else {
                        // Still processing
                        if (data.progress !== undefined) {
                            progressBar.style.width = data.progress + '%';
                            progressText.textContent = data.progress + '%';
                        }
                        if (data.total_pages) {
                            statusDetail.textContent = `Processing page ${data.processed_pages} of ${data.total_pages}`;
                        }
                        setTimeout(checkStatus, 2000);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    setTimeout(checkStatus, 5000);
                });
        }

        checkStatus();
    </script>
</body>
</html>
